services:

  # Interactive R session with mirai loaded
  r:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    stdin_open: true
    tty: true
    command: R

  # Dispatcher: accepts connections from workers and fans out mirai tasks
  dispatcher:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    command: >
      Rscript -e "
        library(mirai);
        daemons(url = 'tcp://0.0.0.0:${MIRAI_PORT}');
        cat('Dispatcher ready\n');
        Sys.sleep(Inf)
      "
    ports:
      - "${MIRAI_PORT}:${MIRAI_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/${MIRAI_PORT:-5555}' 2>/dev/null || exit 1"]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 5s

  # Workers: connect back to dispatcher and execute mirai tasks
  worker:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    command: >
      Rscript -e "
        library(mirai);
        host <- Sys.getenv('MIRAI_HOST');
        if (host == '') stop('MIRAI_HOST is not set');
        url <- paste0('tcp://', host, ':${MIRAI_PORT}');
        repeat {
          tryCatch(
            { cat('Worker connecting to', url, '\n'); daemon(url); break },
            error = function(e) { cat('Connection refused, retrying in 2s...\n'); Sys.sleep(2) }
          )
        }
      "
    environment:
      - MIRAI_HOST
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x Rscript > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    depends_on:
      dispatcher:
        condition: service_healthy
    restart: on-failure
    deploy:
      replicas: ${MIRAI_WORKERS:-4}
