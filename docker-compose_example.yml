services:

  # Your R session - this IS the dispatcher.
  # Once inside, run: daemons(url = "tcp://0.0.0.0:5555")
  # Workers will then connect to this session.
  r:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    stdin_open: true
    tty: true
    command: R
    ports:
      - "${MIRAI_PORT}:${MIRAI_PORT}"

  # Workers connect to MIRAI_HOST:MIRAI_PORT (wherever the R session is running)
  worker:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    command: >
      Rscript -e "
        library(mirai);
        host <- Sys.getenv('MIRAI_HOST');
        if (host == '') stop('MIRAI_HOST is not set');
        url <- paste0('tcp://', host, ':${MIRAI_PORT}');
        repeat {
          tryCatch(
            {
              cat('Connecting to', url, '\n');
              result <- daemon(url);
              cat('daemon() returned:', deparse(result), '\n')
            },
            error = function(e) cat('Error:', conditionMessage(e), '\n')
          );
          cat('Reconnecting in 2s...\n');
          Sys.sleep(2)
        }
      "
    environment:
      - MIRAI_HOST
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x Rscript > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: on-failure
    deploy:
      replicas: ${MIRAI_WORKERS:-4}
