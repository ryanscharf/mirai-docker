services:

  # Worker management API — exposes /workers/start, /workers/stop, /workers (list)
  # Deploy this on TrueNAS (or wherever workers run). Needs Docker socket access.
  mirai-api:
    image: ghcr.io/ryanscharf/mirai-docker-api:latest
    environment:
      - MIRAI_API_PORT=${MIRAI_API_PORT:-8080}
      - MIRAI_IMAGE=ghcr.io/ryanscharf/mirai-docker:latest
    ports:
      - "${MIRAI_API_PORT:-8080}:${MIRAI_API_PORT:-8080}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # Workers are started on-demand by the API — not by docker compose up.
  # This service exists for local testing only.
  # For production use, workers are launched by POSTing to /workers/start.
  worker:
    image: ghcr.io/ryanscharf/mirai-docker:latest
    command: >
      Rscript -e "
        library(mirai);
        host <- Sys.getenv('MIRAI_HOST');
        if (host == '') stop('MIRAI_HOST is not set');
        url <- paste0('tcp://', host, ':${MIRAI_PORT}');
        repeat {
          connected <- tryCatch(
            { cat('Connecting to', url, '\n'); daemon(url); TRUE },
            error = function(e) { cat('Error:', conditionMessage(e), '\n'); FALSE }
          );
          if (connected) { cat('Dispatcher closed. Exiting.\n'); break };
          cat('Retrying in 2s...\n');
          Sys.sleep(2)
        }
      "
    environment:
      - MIRAI_HOST
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x Rscript > /dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: on-failure
    deploy:
      replicas: ${MIRAI_WORKERS:-4}
